<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Aqua Jar</title>

    <!-- Font Awesome Icons (Jar Icon) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="container">
      <!-- Login Form -->
      <form id="login-form" autocomplete="on">
        <!-- Logo and title -->
        <header class="login-logo-title">
          <i class="fa-solid fa-jar" aria-hidden="true"></i>
          <span>Aqua Jar</span>
        </header>

        <!-- Login Header -->
        <section class="login-header">
          <h1>Login to your account</h1>
          <p>Welcome back! Enter your details to login to your account</p>
        </section>

        <!-- Input Fields -->
        <section class="input-section">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="input-boxes"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="input-boxes"
              autocomplete="current-password"
              required
            />
          </div>

          <!-- Remember Me -->
          <div class="form-group remember">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Remember me</label>
          </div>
        </section>

        <!-- Login Button -->
        <button id="login-btn" type="submit">Login</button>

        <!-- Create Account Link -->
        <p class="create-account-link">
          New here? <a href="/signup.html">Create Account</a>
        </p>
      </form>
    </main>
    <script src="login.js"></script>
  </body>
</html>
