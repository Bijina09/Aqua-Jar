<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <form id="login-form">
        <div class="login-logo-title">
          <i class="fa-solid fa-jar" style="color: rgb(102, 17, 220)"></i>
          <span>Aqua Jar</span>
        </div>
        <br />
        <div id="login-header">
          <h2>Login to your account</h2>
          <p style="color: #807c7c">
            Welcome back! Enter your details to login to your account
          </p>
        </div>
        <br />
        <div>
          <label for="email">Email</label> <br />
          <input
            type="text"
            id="email"
            name="email"
            class="input-boxes"
          /><br />
          <label for="password">Password</label> <br />
          <input
            type="password"
            id="password"
            name="password"
            class="input-boxes"
          /><br />
        </div>
        <br />
        <label for="remember" id="label-remember">
          <input type="checkbox" id="remember" name="remember" />
          Remember me
        </label>
        <br />
        <button id="login-btn">Login</button> <br /><br />
        <div class="create-account-link">
          New here? <a href="/signup.html">Create Account</a>
        </div>
      </form>
    </div>
    <script src="login.js"></script>
  </body>
</html>
